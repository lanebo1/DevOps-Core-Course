# Development environment overrides
# Usage: helm install myapp-dev k8s/devops-info-service -f k8s/devops-info-service/values-dev.yaml

replicaCount: 1

image:
  tag: "latest"
  pullPolicy: Always

service:
  type: NodePort
  port: 80
  targetPort: 5000
  nodePort: 30080

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Faster probe responses for dev — quicker feedback loop
livenessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 5000
  initialDelaySeconds: 3
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

hooks:
  preInstall:
    enabled: true
    image: busybox
    weight: "-5"
  postInstall:
    enabled: true
    image: busybox
    weight: "5"
